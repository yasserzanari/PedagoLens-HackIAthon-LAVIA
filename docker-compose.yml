version: '3.9'

services:
  db:
    image: mysql:8.0
    container_name: pedagolens-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: pedagolens
      MYSQL_USER: pedagolens
      MYSQL_PASSWORD: pedagolens_local_pass
      MYSQL_ROOT_PASSWORD: root_local_pass
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - db_data:/var/lib/mysql

  wordpress:
    image: wordpress:6.5-php8.1-apache
    container_name: pedagolens-wp
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: pedagolens
      WORDPRESS_DB_USER: pedagolens
      WORDPRESS_DB_PASSWORD: pedagolens_local_pass
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_DEBUG', true);
        define('WP_DEBUG_LOG', true);
        define('WP_DEBUG_DISPLAY', false);
    volumes:
      - wp_data:/var/www/html
      - ./plugins:/var/www/html/wp-content/plugins

  n8n:
    image: n8nio/n8n:latest
    container_name: pedagolens-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - TZ=America/Toronto
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  db_data:
  wp_data:
  n8n_data:
